<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body>

    <div class="div">

        <h1 class="h1">Contact Us Today!</h1>



        <form class="form" action="server.java" method="post">

            <label for="name">First Name</label>
            <input type="text" name="name" id="name" placeholder="First Name"> <br> <br>

            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" id="last_name" placeholder="Last Name"> <br> <br>

            <label for="age">Your age</label>
            <input class="data" type="date" name="age" id="age" placeholder="Your age"> <br> <br>

            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="E-mail Address"> <br> <br>

            <label for="phone">Phone #</label>
            <input type="number" name="phone" id="phone" placeholder="(845)555-1212"> <br> <br>

            <label for="address">Address</label>
            <input type="text" name="address" id="address" placeholder="Address"> <br> <br>

            <label for="city">City</label>
            <input type="text" name="city" id="city" placeholder="city"> <br> <br>

            <label for="state">State</label>
            <select class="state" name="state" id="state">

                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>

            </select> <br> <br>

            <label for="zip code">Zip code</label>
            <input type="password" name="zip code" id="zip code" placeholder="Zip Code"> <br> <br>

            <label for="website name">Website or domain name</label>
            <input type="text" name="website name" id="website name" placeholder="Website or domain name"> <br> <br>

            <label for="hosting">Do you have hosting?</label>
            <input class="radio1" type="radio" name="hosting" id="hosting" value="yes"> <b>Yes</b>
            <input class="radio2" type="radio" name="hosting" id="hosting" value="no"> <b>No</b> <br> <br>

            <p>Your Knowledges:</p>

            <label for="knowledge">HTML</label>
            <input class="knowledge" type="checkbox" name="knowledge" id="knowledge" placeholder="Your knowledges"> <br>
            <br>

            <label for="knowledge1">CSS</label>
            <input class="knowledge" type="checkbox" name="knowledge1" id="knowledge1" placeholder="Your knowledges"> <br>
            <br>

            <label for="knowledge2">JavaScript</label>
            <input class="knowledge" type="checkbox" name="knowledge2" id="knowledge2" placeholder="Your knowledges"> <br>
            <br>

            <label for="project_description">Project Description</label>
            <textarea name="project_description" id="project_description" cols="40" rows="5"
                placeholder="Project Description"></textarea> <br>

            <label for="project_file">Your project file</label>
            <input class="project" type="file" name="project_file" id="project_file" placeholder=" Your project file">
            <br> <br>


            <button>Log in</button>


        </form>


    </div>

</body>

</html>
